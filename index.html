<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>えいご まいにちレッスン</title>
<style>
  :root {
    --bg: #f6f4ef;
    --card: #ffffff;
    --line: #e5e1d8;
    --text: #3a3833;
    --muted: #8b8578;
    --accent: #4a90d9;
    --accent-soft: #e3eef9;
    --green: #5cb85c;
    --green-soft: #e8f5e8;
    --gold: #d9a72c;
    --gold-soft: #f7efd8;
    --pink: #e08a9b;
    --radius: 18px;
    --shadow: 0 2px 8px rgba(40, 38, 33, 0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", "BIZ UDGothic", sans-serif;
    font-size: 16px;
    line-height: 1.6;
    -webkit-user-select: none;
    user-select: none;
  }
  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    background: none;
    color: inherit;
  }
  .screen { display: none; max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; min-height: 100%; }
  .screen.active { display: block; }

  /* ===== 共通パーツ ===== */
  .big-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-size: 19px;
    font-weight: bold;
    border-radius: 999px;
    padding: 16px;
    box-shadow: 0 4px 12px rgba(74, 144, 217, 0.35);
    transition: transform 0.15s, opacity 0.2s;
  }
  .big-btn:active { transform: scale(0.97); }
  .big-btn:disabled { opacity: 0.35; box-shadow: none; }
  .big-btn.green { background: var(--green); box-shadow: 0 4px 12px rgba(92, 184, 92, 0.35); }
  .sub-btn {
    display: inline-block;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 15px;
    font-weight: bold;
    color: var(--muted);
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .sub-btn:active { transform: scale(0.95); }
  .sub-btn.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px;
  }
  h2.section-title { font-size: 21px; text-align: center; margin-bottom: 4px; }
  .section-sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 16px; }

  /* ===== はじめの おとチェック ===== */
  #screen-soundcheck { text-align: center; padding-top: 12vh; }
  #screen-soundcheck .emoji-big { font-size: 84px; margin-bottom: 20px; }
  #screen-soundcheck h1 { font-size: 24px; margin-bottom: 10px; }
  #screen-soundcheck p { color: var(--muted); margin-bottom: 28px; font-size: 15px; }
  #btn-heard { margin-top: 18px; display: none; }
  #btn-heard.show { display: block; }
  .hint-mute { font-size: 13px; color: var(--muted); margin-top: 22px; }

  /* ===== たまご えらび ===== */
  .egg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; margin-top: 18px; }
  .egg-cell {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 8px 12px;
    text-align: center;
    transition: transform 0.15s;
  }
  .egg-cell:active { transform: scale(0.95); }
  .egg-cell svg { width: 96px; height: 96px; }
  .egg-cell .egg-name { font-size: 14px; font-weight: bold; margin-top: 4px; }

  /* ===== ホーム ===== */
  .home-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .home-head h1 { font-size: 20px; }
  .icon-btn {
    width: 52px; height: 52px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow);
    font-size: 24px;
    transition: transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.92); }

  .pet-stage-area { text-align: center; padding: 22px 16px 16px; position: relative; overflow: hidden; }
  .pet-img-wrap { position: relative; display: inline-block; }
  .pet-img-wrap img, .pet-img-wrap svg { width: 190px; height: 190px; object-fit: contain; border-radius: 24px; }
  .pet-img-wrap.eating { animation: eatBounce 0.7s ease; }
  @keyframes eatBounce {
    0%,100% { transform: scale(1); }
    25% { transform: scale(1.08) rotate(-3deg); }
    50% { transform: scale(0.96) rotate(2deg); }
    75% { transform: scale(1.05); }
  }
  .pet-stage-name { font-size: 17px; font-weight: bold; margin-top: 8px; }
  .pet-species-name { font-size: 13px; color: var(--muted); }
  .grow-bar-wrap { margin: 14px auto 4px; max-width: 300px; }
  .grow-bar-bg { height: 14px; background: #eee9de; border-radius: 999px; overflow: hidden; }
  .grow-bar-fill { height: 100%; background: linear-gradient(90deg, #8ec8f5, var(--accent)); border-radius: 999px; transition: width 0.5s; }
  .grow-bar-label { font-size: 12.5px; color: var(--muted); margin-top: 4px; text-align: center; }

  .feed-row { display: flex; justify-content: center; align-items: center; gap: 14px; margin-top: 14px; }
  .feed-stock { font-size: 17px; font-weight: bold; background: var(--gold-soft); border: 1px solid #ecd8a0; border-radius: 999px; padding: 8px 18px; }
  .feed-btn {
    background: var(--gold);
    color: #fff;
    font-size: 17px;
    font-weight: bold;
    border-radius: 999px;
    padding: 12px 26px;
    box-shadow: 0 4px 10px rgba(217, 167, 44, 0.35);
    transition: transform 0.15s, opacity 0.2s;
  }
  .feed-btn:active { transform: scale(0.94); }
  .feed-btn:disabled { opacity: 0.35; box-shadow: none; }
  .fly-feed {
    position: absolute;
    font-size: 34px;
    pointer-events: none;
    animation: flyFeed 0.7s ease forwards;
  }
  @keyframes flyFeed {
    0% { transform: translate(0, 90px) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translate(0, -10px) scale(0.4); opacity: 0; }
  }

  .home-lesson-card { margin-top: 18px; text-align: center; }
  .home-lesson-card .day-label { font-size: 14px; color: var(--muted); }
  .home-lesson-card .day-title { font-size: 20px; font-weight: bold; margin: 4px 0 14px; }
  .streak-row { display: flex; justify-content: center; gap: 18px; margin-top: 16px; font-size: 14px; color: var(--muted); }
  .streak-row b { color: var(--text); font-size: 17px; }

  .new-egg-banner {
    display: none;
    margin-top: 16px;
    background: var(--gold-soft);
    border: 1px solid #ecd8a0;
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .new-egg-banner.show { display: block; }
  .new-egg-banner p { font-weight: bold; color: #8a6408; margin-bottom: 10px; }

  /* ===== レッスン共通 ===== */
  .lesson-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .lesson-head .back { font-size: 22px; width: 44px; height: 44px; border-radius: 12px; background: var(--card); border: 1px solid var(--line); }
  .progress-dots { display: flex; gap: 7px; justify-content: center; flex: 1; }
  .progress-dots .dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: #e8e4da; color: var(--muted);
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .progress-dots .dot.now { background: var(--accent); color: #fff; font-weight: bold; }
  .progress-dots .dot.done { background: var(--green-soft); color: var(--green); }

  .scene-emoji { font-size: 72px; text-align: center; margin: 10px 0; }

  /* 会話スクリプト */
  .dialogue-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .line {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 12px; border-radius: 14px;
    background: var(--card); border: 1px solid var(--line);
    transition: background 0.2s, border-color 0.2s;
  }
  .line.mum { margin-right: 26px; }
  .line.child { margin-left: 26px; background: var(--accent-soft); border-color: #cfe2f5; }
  .line.playing { border-color: var(--accent); background: #fdf6df; }
  .line .who { font-size: 24px; flex-shrink: 0; }
  .line .en { font-weight: bold; font-size: 16.5px; }
  .line .ja { font-size: 13px; color: var(--muted); display: none; }
  .show-ja .line .ja { display: block; }
  .listen-controls { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }

  /* スピーキング */
  .speak-card { text-align: center; }
  .speak-count { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .speak-en { font-size: 22px; font-weight: bold; margin: 8px 0 2px; }
  .speak-ja { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  .speak-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 18px; }
  .rec-btn {
    background: var(--pink); color: #fff;
    font-size: 16px; font-weight: bold;
    border-radius: 999px; padding: 12px 22px;
    box-shadow: 0 4px 10px rgba(224, 138, 155, 0.4);
  }
  .rec-btn.recording { animation: recPulse 1s infinite; }
  @keyframes recPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

  /* たんごカード */
  .word-card { text-align: center; padding: 26px 18px; }
  .word-emoji { font-size: 76px; }
  .word-en { font-size: 30px; font-weight: bold; margin-top: 6px; }
  .word-ja { font-size: 16px; color: var(--muted); }
  .word-sentence { font-size: 15px; margin-top: 12px; background: var(--bg); border-radius: 12px; padding: 10px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .quiz-opt {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 16px;
    padding: 16px 8px; text-align: center; box-shadow: var(--shadow);
    font-size: 15px; font-weight: bold;
    transition: transform 0.15s;
  }
  .quiz-opt:active { transform: scale(0.95); }
  .quiz-opt .q-emoji { font-size: 44px; display: block; }
  .quiz-opt.wrong { animation: shake 0.4s; border-color: var(--pink); }
  .quiz-opt.right { border-color: var(--green); background: var(--green-soft); }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); } }

  /* フレーズ */
  .phrase-en { font-size: 24px; font-weight: bold; text-align: center; margin: 6px 0 2px; }
  .phrase-ja { text-align: center; color: var(--muted); font-size: 15px; }
  .phrase-note { background: var(--gold-soft); border-radius: 12px; padding: 12px; font-size: 14px; margin-top: 14px; }
  .phrase-example { margin-top: 10px; font-size: 15px; text-align: center; }

  /* フォニックス */
  .phonics-sound { font-size: 56px; font-weight: bold; text-align: center; color: var(--accent); }
  .phonics-words { display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
  .phonics-word {
    background: var(--card); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 12px 18px; font-size: 19px; font-weight: bold; box-shadow: var(--shadow);
  }
  .phonics-word:active { transform: scale(0.95); }

  /* おさらい */
  .review-progress { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }

  /* セクションクリア（エサげっと） */
  #screen-getfeed { text-align: center; padding-top: 14vh; }
  #screen-getfeed .feed-big { font-size: 100px; animation: popIn 0.5s ease; }
  @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
  #screen-getfeed h2 { font-size: 24px; margin: 12px 0 6px; }
  #screen-getfeed p { color: var(--muted); margin-bottom: 30px; }

  /* ずかん */
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
  .gallery-card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px; text-align: center;
    transition: transform 0.15s;
  }
  .gallery-card:active { transform: scale(0.96); }
  .gallery-card img { width: 100%; aspect-ratio: 1; object-fit: contain; border-radius: 16px; }
  .gallery-card .g-name { font-weight: bold; font-size: 15px; margin-top: 6px; }
  .gallery-card .g-date { font-size: 12px; color: var(--muted); }
  .gallery-empty { text-align: center; color: var(--muted); margin-top: 60px; font-size: 15px; }

  /* ずかん詳細（大きく表示） */
  #gallery-detail {
    position: fixed; inset: 0; background: rgba(30, 28, 24, 0.85);
    display: none; align-items: center; justify-content: center; z-index: 50;
    padding: 20px;
  }
  #gallery-detail.show { display: flex; }
  .detail-card {
    background: var(--card); border-radius: 24px; padding: 22px;
    text-align: center; max-width: 480px; width: 100%;
    max-height: 92vh; overflow: auto;
  }
  .detail-card img { width: 100%; max-width: 400px; border-radius: 20px; }
  .detail-card .d-name { font-size: 24px; font-weight: bold; margin-top: 10px; }
  .detail-card .d-date { color: var(--muted); font-size: 14px; margin-bottom: 14px; }

  /* おいわい */
  .celebrate {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(255, 252, 240, 0.94); z-index: 60; text-align: center; padding: 24px;
  }
  .celebrate.show { display: flex; }
  .celebrate .inner h2 { font-size: 26px; margin: 14px 0 8px; }
  .celebrate .inner img { width: 220px; height: 220px; object-fit: contain; border-radius: 24px; animation: popIn 0.6s ease; }
  .celebrate .inner p { color: var(--muted); margin-bottom: 24px; }
</style>
</head>
<body>

<!-- ============ おとチェック ============ -->
<div class="screen" id="screen-soundcheck">
  <div class="emoji-big">🔊</div>
  <h1>おとの チェック</h1>
  <p>ボタンを おして<br>えいごの こえが きこえるか<br>ためして みよう</p>
  <button class="big-btn" id="btn-soundtest">🔊 おとを ならす</button>
  <button class="big-btn green" id="btn-heard">きこえた！</button>
  <p class="hint-mute">きこえないときは、よこの スイッチ（マナーモード）と おんりょうを かくにんしてね</p>
</div>

<!-- ============ たまごえらび ============ -->
<div class="screen" id="screen-eggpick">
  <h2 class="section-title">🥚 たまごを えらぼう</h2>
  <p class="section-sub">レッスンを クリアして エサをあげると そだつよ</p>
  <div class="egg-grid" id="egg-grid"></div>
</div>

<!-- ============ ホーム ============ -->
<div class="screen" id="screen-home">
  <div class="home-head">
    <h1>えいご まいにちレッスン</h1>
    <button class="icon-btn" id="btn-gallery" aria-label="ずかん">📖</button>
  </div>

  <div class="card pet-stage-area" id="pet-area">
    <div class="pet-img-wrap" id="pet-img-wrap"></div>
    <div class="pet-stage-name" id="pet-stage-name"></div>
    <div class="pet-species-name" id="pet-species-name"></div>
    <div class="grow-bar-wrap">
      <div class="grow-bar-bg"><div class="grow-bar-fill" id="grow-fill"></div></div>
      <div class="grow-bar-label" id="grow-label"></div>
    </div>
    <div class="feed-row">
      <span class="feed-stock">🍖 × <span id="feed-count">0</span></span>
      <button class="feed-btn" id="btn-feed">エサを あげる</button>
    </div>
  </div>

  <div class="new-egg-banner" id="new-egg-banner">
    <p>🎉 さいごまで そだてたね！ ずかんに きろくしたよ</p>
    <button class="big-btn" id="btn-new-egg">🥚 あたらしい たまごを えらぶ</button>
  </div>

  <div class="card home-lesson-card">
    <div class="day-label" id="lesson-day-label"></div>
    <div class="day-title" id="lesson-day-title"></div>
    <button class="big-btn" id="btn-start-lesson"></button>
  </div>

  <div class="streak-row">
    <span>🔥 れんぞく <b id="streak-num">0</b> にち</span>
    <span>✅ ぜんぶで <b id="total-num">0</b> レッスン</span>
  </div>
</div>

<!-- ============ レッスン ============ -->
<div class="screen" id="screen-lesson">
  <div class="lesson-head">
    <button class="back" id="btn-lesson-back">←</button>
    <div class="progress-dots" id="progress-dots"></div>
    <div style="width:44px"></div>
  </div>
  <div id="lesson-body"></div>
</div>

<!-- ============ エサげっと ============ -->
<div class="screen" id="screen-getfeed">
  <div class="feed-big">🍖</div>
  <h2 id="getfeed-title">エサを げっと！</h2>
  <p id="getfeed-sub"></p>
  <button class="big-btn green" id="btn-getfeed-next">つぎへ →</button>
</div>

<!-- ============ ずかん ============ -->
<div class="screen" id="screen-gallery">
  <div class="lesson-head">
    <button class="back" id="btn-gallery-back">←</button>
    <h2 class="section-title" style="flex:1">📖 そだてた ずかん</h2>
    <div style="width:44px"></div>
  </div>
  <div id="gallery-body"></div>
</div>

<!-- ずかん詳細 -->
<div id="gallery-detail">
  <div class="detail-card" id="detail-card"></div>
</div>

<!-- おいわい（成長・コンプリート） -->
<div class="celebrate" id="celebrate">
  <div class="inner">
    <div id="celebrate-img"></div>
    <h2 id="celebrate-title"></h2>
    <p id="celebrate-sub"></p>
    <button class="big-btn" id="btn-celebrate-ok">やったー！</button>
  </div>
</div>

<script>
/* ================= 生き物の画像 =================
   前作 studyschedule から流用（各種 4段階の画像） */

function eggSVG(egg) {
  const c = egg.decoColor;
  let deco = "";
  if (egg.deco === "spots") {
    deco = `<circle cx="47" cy="52" r="5" fill="${c}"/><circle cx="74" cy="44" r="4" fill="${c}"/>
      <circle cx="66" cy="72" r="6" fill="${c}"/><circle cx="44" cy="82" r="4" fill="${c}"/>
      <circle cx="78" cy="90" r="4.5" fill="${c}"/>`;
  } else if (egg.deco === "stripes") {
    deco = `<path d="M29 60 Q60 50 91 60" stroke="${c}" stroke-width="6" fill="none"/>
      <path d="M31 82 Q60 72 89 82" stroke="${c}" stroke-width="6" fill="none"/>`;
  } else if (egg.deco === "zigzag") {
    deco = `<path d="M31 64 L41 56 L51 64 L61 56 L71 64 L81 56 L89 62" stroke="${c}" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M34 88 L44 80 L54 88 L64 80 L74 88 L84 81" stroke="${c}" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  } else if (egg.deco === "hearts") {
    deco = `<path d="M52 54 a5 5 0 0 1 8 0 a5 5 0 0 1 8 0 q0 6 -8 12 q-8 -6 -8 -12" fill="${c}"/>
      <path d="M40 80 a3.5 3.5 0 0 1 5.5 0 a3.5 3.5 0 0 1 5.5 0 q0 4 -5.5 8.5 q-5.5 -4.5 -5.5 -8.5" fill="${c}"/>
      <path d="M68 84 a3 3 0 0 1 5 0 a3 3 0 0 1 5 0 q0 4 -5 7.5 q-5 -3.5 -5 -7.5" fill="${c}"/>`;
  } else if (egg.deco === "stars") {
    deco = `<path d="M60 44 l2.8 6.4 6.8 .5 -5.2 4.6 1.6 6.6 -6 -3.6 -6 3.6 1.6 -6.6 -5.2 -4.6 6.8 -.5 Z" fill="${c}"/>

  }
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <ellipse cx="60" cy="68" rx="33" ry="42" fill="${egg.base}" stroke="#c9c2b4" stroke-width="2.5"/>
    ${deco}
    <ellipse cx="47" cy="42" rx="8" ry="12" fill="#ffffff" opacity="0.5" transform="rotate(-18 47 42)"/>
  </svg>`;
}

/* ================= 状態管理 ================= */
const STORE_KEY = "eigoLessonV1";
let state = loadState();

function defaultState() {
  return {
    soundChecked: false,
    eggId: null,
    fed: 0,               // いまの生き物にあげたエサの合計
    feedStock: 0,         // まだあげていないエサ
    completedDays: {},    // { "1": "2026-07-05", ... }
    lastClearDate: null,
    streak: 0,
    gallery: [],          // [{species, date}]
    petDone: false,       // ママまで育ち、あたらしいたまご待ち
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) {}
  return defaultState();
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

/* ================= 音声 (TTS) ================= */
const synth = window.speechSynthesis;
let voiceMum = null, voiceChild = null;

function pickVoices() {
  const voices = synth.getVoices();
  if (!voices.length) return;
  const en = voices.filter(v => v.lang && v.lang.toLowerCase().startsWith("en"));
  const gb = en.filter(v => v.lang.toLowerCase().startsWith("en-gb"));
  const pool = gb.length ? gb : en;
  if (!pool.length) return;
  const byName = names => pool.find(v => names.some(n => v.name.toLowerCase().includes(n)));
  voiceMum = byName(["kate", "serena", "martha", "stephanie", "female"]) || pool[0];
  voiceChild = byName(["daniel", "arthur", "oliver"]) || pool[Math.min(1, pool.length - 1)];
}
pickVoices();
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = pickVoices;

function speak(text, opts = {}) {
  return new Promise(resolve => {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const who = opts.who || "mum";
    u.voice = who === "child" ? (voiceChild || voiceMum) : (voiceMum || voiceChild);
    u.lang = (u.voice && u.voice.lang) || "en-GB";
    u.rate = opts.rate || (who === "child" ? 0.95 : 0.92);
    u.pitch = opts.pitch || (who === "child" && voiceChild === voiceMum ? 1.35 : who === "child" ? 1.15 : 1.0);
    u.onend = resolve;
    u.onerror = resolve;
    synth.speak(u);
  });
}
let playToken = 0; // 連続再生のキャンセル用
function stopSpeaking() { playToken++; synth.cancel(); }

/* ================= 効果音 ================= */
let audioCtx = null;
function beep(freqs, dur = 0.12) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    let t = audioCtx.currentTime;
    freqs.forEach(f => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.value = f; o.type = "sine";
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t + dur);
      t += dur * 0.9;
    });
  } catch (e) {}
}
const seGet = () => beep([660, 880], 0.14);
const seEat = () => beep([440, 550, 660], 0.1);
const seRight = () => beep([784, 1046], 0.12);
const seWrong = () => beep([220], 0.2);
const seGrow = () => beep([523, 659, 784, 1046], 0.16);

  stopSpeaking();
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0, 0);
}

  const grid = document.getElementById("egg-grid");
  grid.innerHTML = "";

    b.className = "egg-cell";
    b.innerHTML = eggSVG(egg) + `<div class="egg-name">${egg.name}</div>`;
    b.onclick = () => {
      state.eggId = egg.id;
      state.fed = 0;
      state.petDone = false;
      saveState();
      seGet();
      show("screen-home");
      renderHome();
    };
    grid.appendChild(b);

}

/* ================= 育成 ================= */
function currentEgg() { return EGGS.find(e => e.id === state.eggId) || EGGS[0]; }
function currentSpecies() { return SPECIES[currentEgg().species]; }
function stageIndex() {
  const st = currentSpecies().stages;
  let idx = -1; // -1 = たまご
  for (let i = 0; i < st.length; i++) if (state.fed >= st[i].need) idx = i;
  return idx;
}

function renderHome() {
  const egg = currentEgg(), sp = currentSpecies(), idx = stageIndex();
  const wrap = document.getElementById("pet-img-wrap");
  if (idx === -1) {
    wrap.innerHTML = eggSVG(egg);
    document.getElementById("pet-stage-name").textContent = egg.name;
    document.getElementById("pet-species-name").textContent = "なにが うまれるかな？";
  } else {
    wrap.innerHTML = `<img src="${sp.stages[idx].img}" alt="">`;
    document.getElementById("pet-stage-name").textContent = sp.stages[idx].name;
    document.getElementById("pet-species-name").textContent = sp.name;
  }
  // 成長バー
  const stages = sp.stages;
  const prev = idx === -1 ? 0 : stages[idx].need;
  const next = idx >= stages.length - 1 ? null : stages[idx + 1] ? stages[idx + 1].need : null;
  const target = idx === -1 ? stages[0].need : next;
  const fill = document.getElementById("grow-fill");
  const label = document.getElementById("grow-label");
  if (state.petDone || target === null) {
    fill.style.width = "100%";
    label.textContent = "さいごまで そだったよ！";
  } else {
    const pct = Math.min(100, Math.round(((state.fed - prev) / (target - prev)) * 100));
    fill.style.width = pct + "%";
    label.textContent = `つぎまで あと 🍖${target - state.fed}`;
  }
  document.getElementById("feed-count").textContent = state.feedStock;
  document.getElementById("btn-feed").disabled = state.feedStock <= 0 || state.petDone;
  document.getElementById("new-egg-banner").classList.toggle("show", state.petDone);

  // レッスンカード
  const nextDay = nextLessonDay();
  const label2 = document.getElementById("lesson-day-label");
  const title2 = document.getElementById("lesson-day-title");
  const btn = document.getElementById("btn-start-lesson");
  if (!nextDay) {
    label2.textContent = "ぜんぶの レッスンを クリア！";
    title2.textContent = "🎉 すごい！";
    btn.textContent = "もういちど あそぶ";
    btn.disabled = false;
    btn.dataset.day = DAYS[DAYS.length - 1].day;
    btn.dataset.replay = "1";
  } else {
    const d = DAYS.find(x => x.day === nextDay);
    const clearedToday = Object.values(state.completedDays).filter(v => v === todayStr()).length;
    label2.textContent = clearedToday > 0
      ? `きょう ${clearedToday}レッスン クリア！ つぎは Day ${d.day} ${d.scene}`
      : `Day ${d.day} ${d.scene}`;
    title2.textContent = d.title;
    btn.textContent = "レッスンを はじめる";
    btn.disabled = false;
    btn.dataset.day = d.day;
    btn.dataset.replay = "";
  }
  document.getElementById("streak-num").textContent = state.streak;
  document.getElementById("total-num").textContent = Object.keys(state.completedDays).length;
}

function nextLessonDay() {
  for (const d of DAYS) if (!state.completedDays[d.day]) return d.day;
  return null;
}

document.getElementById("btn-feed").onclick = () => {
  if (state.feedStock <= 0 || state.petDone) return;
  const beforeIdx = stageIndex();
  state.feedStock--;
  state.fed++;
  saveState();
  seEat();
  // エサが とんでいく
  const area = document.getElementById("pet-area");
  const fly = document.createElement("div");
  fly.className = "fly-feed";
  fly.textContent = "🍖";
  fly.style.left = "50%";
  fly.style.bottom = "70px";
  area.appendChild(fly);
  setTimeout(() => fly.remove(), 700);
  const wrap = document.getElementById("pet-img-wrap");
  wrap.classList.remove("eating");
  void wrap.offsetWidth;
  wrap.classList.add("eating");

  const afterIdx = stageIndex();
  setTimeout(() => {
    renderHome();
    if (afterIdx > beforeIdx) {
      const sp = currentSpecies();
      const isLast = afterIdx === sp.stages.length - 1;
      if (isLast) {
        state.petDone = true;
        state.gallery.push({ species: currentEgg().species, date: todayStr() });
        saveState();
      }
      seGrow();
      showCelebrate(
        `<img src="${sp.stages[afterIdx].img}" alt="">`,
        isLast ? "さいごまで そだった！" : `${sp.stages[afterIdx].name} に せいちょう！`,
        isLast ? `${sp.name}は りっぱな ママに なったよ。ずかんに きろくしたよ！` : "エサを あげて もっと そだてよう！"
      );
    }
  }, 500);
};

/* ================= レッスン ================= */
let lesson = null; // { day, sections, idx, replay }

document.getElementById("btn-start-lesson").onclick = e => {
  const day = Number(e.currentTarget.dataset.day);
  const replay = e.currentTarget.dataset.replay === "1";
  startLesson(day, replay);
};
document.getElementById("btn-lesson-back").onclick = () => {
  stopRecording();
  show("screen-home");
  renderHome();
};

function startLesson(dayNum, replay) {
  const d = DAYS.find(x => x.day === dayNum);
  const prevDay = DAYS.filter(x => x.day < dayNum && state.completedDays[x.day]).pop()
    || DAYS.filter(x => x.day < dayNum).pop();
  const sections = [];
  if (prevDay) sections.push({ type: "review", data: prevDay });
  sections.push({ type: "listen", data: d });
  sections.push({ type: "speak", data: d });
  sections.push({ type: "words", data: d });
  sections.push({ type: "phrases", data: d });
  sections.push({ type: "phonics", data: d });
  lesson = { day: dayNum, sections, idx: 0, replay };
  show("screen-lesson");
  renderSection();
}

const SECTION_ICONS = { review: "🔁", listen: "👂", speak: "🎤", words: "🔤", phrases: "💬", phonics: "🔡" };

function renderDots() {
  const dots = document.getElementById("progress-dots");
  dots.innerHTML = "";
  lesson.sections.forEach((s, i) => {
    const el = document.createElement("div");
    el.className = "dot" + (i === lesson.idx ? " now" : i < lesson.idx ? " done" : "");
    el.textContent = i < lesson.idx ? "✓" : SECTION_ICONS[s.type];
    dots.appendChild(el);
  });
}

function renderSection() {
  renderDots();
  stopSpeaking();
  const s = lesson.sections[lesson.idx];
  const body = document.getElementById("lesson-body");
  if (s.type === "review") renderReview(body, s.data);
  else if (s.type === "listen") renderListen(body, s.data);
  else if (s.type === "speak") renderSpeak(body, s.data);
  else if (s.type === "words") renderWords(body, s.data);
  else if (s.type === "phrases") renderPhrases(body, s.data);
  else if (s.type === "phonics") renderPhonics(body, s.data);
}

/* セクションクリア → エサげっと画面 */
function sectionClear(bonus) {
  stopSpeaking();
  stopRecording();
  if (!lesson.replay) {
    state.feedStock++;
    saveState();
  }
  seGet();
  const isLastSection = lesson.idx >= lesson.sections.length - 1;
  document.getElementById("getfeed-title").textContent =
    lesson.replay ? "クリア！" : bonus ? "ボーナスエサを げっと！" : "エサを げっと！";
  document.getElementById("getfeed-sub").textContent =
    lesson.replay ? "（もういちど モードでは エサは もらえないよ）"
    : `もっている エサ：🍖 × ${state.feedStock}`;
  document.getElementById("btn-getfeed-next").textContent = isLastSection ? "🏠 ホームへ" : "つぎへ →";
  show("screen-getfeed");
}

document.getElementById("btn-getfeed-next").onclick = () => {
  lesson.idx++;
  if (lesson.idx >= lesson.sections.length) {
    finishLesson();
  } else {
    show("screen-lesson");
    renderSection();
  }
};

/* フォニックスをスキップした場合など、エサなしで次へ */
function sectionSkip() {
  lesson.idx++;
  if (lesson.idx >= lesson.sections.length) finishLesson();
  else renderSection();
}

function finishLesson() {
  if (!lesson.replay) {
    const t = todayStr();
    state.completedDays[lesson.day] = t;
    // れんぞく記録
    if (state.lastClearDate !== t) {
      const y = new Date(); y.setDate(y.getDate() - 1);
      const yStr = y.getFullYear() + "-" + String(y.getMonth() + 1).padStart(2, "0") + "-" + String(y.getDate()).padStart(2, "0");
      state.streak = (state.lastClearDate === yStr) ? state.streak + 1 : 1;
      state.lastClearDate = t;
    }
    saveState();
  }
  show("screen-home");
  renderHome();
}

/* ---------- 0. おさらい ---------- */
function renderReview(body, prev) {
  const items = [
    ...prev.words.map(w => ({ kind: "word", ...w })),
    ...prev.phrases.map(p => ({ kind: "phrase", ...p })),
  ];
  let i = 0;
  function draw() {
    const it = items[i];
    body.innerHTML = `
      <h2 class="section-title">🔁 きのうの おさらい</h2>
      <p class="section-sub">Day ${prev.day}「${prev.title}」より</p>
      <div class="review-progress">${i + 1} / ${items.length}</div>
      <div class="card word-card">
        ${it.kind === "word" ? `<div class="word-emoji">${it.emoji}</div>` : `<div class="word-emoji">💬</div>`}
        <div class="word-en">${it.en}</div>
        <div class="word-ja">${it.ja}</div>
      </div>
      <div class="listen-controls">
        <button class="sub-btn" id="rv-play">🔊 きく</button>
      </div>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="big-btn" id="rv-ok" style="background: var(--green); box-shadow: 0 4px 12px rgba(92,184,92,0.35);">おぼえてた！</button>
      </div>`;
    const playText = it.kind === "word" ? it.en : it.en.replace(/〜/g, "").replace(/ \/ /g, ". ");
    document.getElementById("rv-play").onclick = () => speak(playText, { who: "mum" });
    document.getElementById("rv-ok").onclick = () => {
      i++;
      if (i >= items.length) sectionClear(false);
      else draw();
    };
    speak(playText, { who: "mum" });
  }
  draw();
}

/* ---------- 1. きく ---------- */
function renderListen(body, d) {
  let phase = 1; // 1=えをみながら 2=もじをみながら
  let listened = false;

  body.innerHTML = `
    <h2 class="section-title">👂 きく</h2>
    <p class="section-sub">Day ${d.day}「${d.title}」</p>
    <div id="listen-stage"></div>
    <div class="listen-controls">
      <button class="sub-btn" id="ls-play">▶ さいしょから きく</button>
      <button class="sub-btn" id="ls-ja">🇯🇵 にほんご</button>
    </div>
    <div style="margin-top:20px;">
      <button class="big-btn green" id="ls-done" disabled>きけた！</button>
    </div>`;

  const stage = document.getElementById("listen-stage");

  function drawPhase() {
    if (phase === 1) {
      stage.innerHTML = `
        <div class="card" style="text-align:center; padding: 30px 16px;">
          <div class="scene-emoji">${d.scene}</div>
          <p style="color:var(--muted); font-size:14.5px;">① まずは えを みながら きいてみよう。<br>なにを はなしているかな？</p>
        </div>`;
    } else {
      stage.innerHTML = `
        <p style="text-align:center; color:var(--muted); font-size:14px; margin-top:8px;">② こんどは もじを みながら きこう。<br>ぎょうを タップすると そこだけ きけるよ。</p>
        <div class="dialogue-list" id="dlg-list"></div>`;
      const list = document.getElementById("dlg-list");
      d.dialogue.forEach((ln, i) => {
        const el = document.createElement("div");
        el.className = "line " + ln.speaker;
        el.innerHTML = `<span class="who">${ln.speaker === "mum" ? "👩" : "🧒"}</span>
          <span><span class="en">${ln.en}</span><span class="ja">${ln.ja}</span></span>`;
        el.onclick = () => { stopSpeaking(); highlight(i); speak(ln.en, { who: ln.speaker }); };
        list.appendChild(el);
      });
    }
  }

  function highlight(i) {
    document.querySelectorAll("#dlg-list .line").forEach((el, j) =>
      el.classList.toggle("playing", i === j));
  }

  async function playAll() {
    const token = ++playToken;
    for (let i = 0; i < d.dialogue.length; i++) {
      if (token !== playToken) return;
      if (phase === 2) {
        highlight(i);
        const el = document.querySelectorAll("#dlg-list .line")[i];
        if (el) el.scrollIntoView({ block: "center", behavior: "smooth" });
      }
      await speak(d.dialogue[i].en, { who: d.dialogue[i].speaker });
      await new Promise(r => setTimeout(r, 350));
    }
    if (token !== playToken) return;
    highlight(-1);
    if (phase === 1) {
      phase = 2;
      drawPhase();
      document.getElementById("ls-play").textContent = "▶ さいしょから きく";
    } else {
      listened = true;
      document.getElementById("ls-done").disabled = false;
    }
  }

  document.getElementById("ls-play").onclick = () => { stopSpeaking(); playAll(); };
  document.getElementById("ls-ja").onclick = e => {
    document.body.classList.toggle("show-ja");
    e.currentTarget.classList.toggle("on");
  };
  document.getElementById("ls-done").onclick = () => sectionClear(false);
  drawPhase();
}

/* ---------- 2. はなす ---------- */
let mediaRecorder = null, recChunks = [], recBlobURL = null, recStream = null;

function stopRecording() {
  try { if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); } catch (e) {}
  try { if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; } } catch (e) {}
  mediaRecorder = null;
}

function renderSpeak(body, d) {
  const lines = d.dialogue.filter(l => l.speaker === "child");
  let i = 0;
  let recording = false;

  function draw() {
    const ln = lines[i];
    body.innerHTML = `
      <h2 class="section-title">🎤 はなす</h2>
      <p class="section-sub">きみは こども役だよ。おてほんの まねを してみよう</p>
      <div class="card speak-card">
        <div class="speak-count">${i + 1} / ${lines.length}</div>
        <div style="font-size:40px;">🧒</div>
        <div class="speak-en">${ln.en}</div>
        <div class="speak-ja">${ln.ja}</div>
        <div class="speak-btns">
          <button class="sub-btn" id="sp-model">🔊 おてほん</button>
          <button class="sub-btn" id="sp-slow">🐢 ゆっくり</button>
        </div>
        <div class="speak-btns">
          <button class="rec-btn" id="sp-rec">🎙 ろくおん する</button>
          <button class="sub-btn" id="sp-listen" disabled style="opacity:0.4;">▶ じぶんの こえ</button>
        </div>
      </div>
      <div style="margin-top:20px;">
        <button class="big-btn green" id="sp-said">いえた！ つぎへ</button>
      </div>`;

    document.getElementById("sp-model").onclick = () => speak(ln.en, { who: "child" });
    document.getElementById("sp-slow").onclick = () => speak(ln.en, { who: "child", rate: 0.6 });

    const recBtn = document.getElementById("sp-rec");
    const listenBtn = document.getElementById("sp-listen");

    recBtn.onclick = async () => {
      if (recording) {
        stopRecording();
        return;
      }
      try {
        stopSpeaking();
        recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recChunks = [];
        mediaRecorder = new MediaRecorder(recStream);
        mediaRecorder.ondataavailable = e => recChunks.push(e.data);
        mediaRecorder.onstop = () => {
          recording = false;
          recBtn.classList.remove("recording");
          recBtn.textContent = "🎙 ろくおん する";
          if (recChunks.length) {
            if (recBlobURL) URL.revokeObjectURL(recBlobURL);
            recBlobURL = URL.createObjectURL(new Blob(recChunks, { type: mediaRecorder ? (mediaRecorder.mimeType || "audio/mp4") : "audio/mp4" }));
            listenBtn.disabled = false;
            listenBtn.style.opacity = "1";
          }
          if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
        };
        mediaRecorder.start();
        recording = true;
        recBtn.classList.add("recording");
        recBtn.textContent = "⏹ ろくおん おわり";
        // 12秒で自動停止
        setTimeout(() => { if (recording) stopRecording(); }, 12000);
      } catch (err) {
        recBtn.textContent = "🎙 マイクが つかえないよ";
        setTimeout(() => { recBtn.textContent = "🎙 ろくおん する"; }, 2000);
      }
    };
    listenBtn.onclick = () => {
      if (recBlobURL) { stopSpeaking(); new Audio(recBlobURL).play(); }
    };
    document.getElementById("sp-said").onclick = () => {
      stopRecording();
      i++;
      if (i >= lines.length) sectionClear(false);
      else draw();
    };
    speak(ln.en, { who: "child" });
  }
  draw();
}

/* ---------- 3. たんご ---------- */
function renderWords(body, d) {
  let phase = "cards"; // cards → quiz
  let i = 0;
  let quizOrder = [];

  function drawCard() {
    const w = d.words[i];
    body.innerHTML = `
      <h2 class="section-title">🔤 たんご</h2>
      <p class="section-sub">きょうの ことば ${i + 1} / ${d.words.length}</p>
      <div class="card word-card">
        <div class="word-emoji">${w.emoji}</div>
        <div class="word-en">${w.en}</div>
        <div class="word-ja">${w.ja}</div>
        <div class="word-sentence">💬 ${w.sentence}</div>
      </div>
      <div class="listen-controls">
        <button class="sub-btn" id="wd-play">🔊 きく</button>
        <button class="sub-btn" id="wd-sent">🔊 ぶんも きく</button>
      </div>
      <div style="margin-top:20px;">
        <button class="big-btn" id="wd-next">${i === d.words.length - 1 ? "クイズに ちょうせん！" : "つぎの ことば →"}</button>
      </div>`;
    document.getElementById("wd-play").onclick = () => speak(w.en, { who: "mum", rate: 0.85 });
    document.getElementById("wd-sent").onclick = () => speak(w.sentence, { who: "mum" });
    document.getElementById("wd-next").onclick = () => {
      i++;
      if (i >= d.words.length) {
        phase = "quiz";
        i = 0;
        quizOrder = shuffle([...d.words]);
        drawQuiz();
      } else drawCard();
    };
    speak(w.en, { who: "mum", rate: 0.85 });
  }

  function drawQuiz() {
    const target = quizOrder[i];
    const options = shuffle([...d.words]);
    body.innerHTML = `
      <h2 class="section-title">🔤 たんごクイズ</h2>
      <p class="section-sub">きこえた ことばは どれかな？ ${i + 1} / ${quizOrder.length}</p>
      <div class="listen-controls" style="margin-top:6px;">
        <button class="sub-btn" id="qz-play">🔊 もういちど きく</button>
      </div>
      <div class="quiz-options" id="qz-opts"></div>`;
    const opts = document.getElementById("qz-opts");
    options.forEach(o => {
      const b = document.createElement("button");
      b.className = "quiz-opt";
      b.innerHTML = `<span class="q-emoji">${o.emoji}</span>${o.ja}`;
      b.onclick = () => {
        if (o.en === target.en) {
          seRight();
          b.classList.add("right");
          setTimeout(() => {
            i++;
            if (i >= quizOrder.length) sectionClear(false);
            else drawQuiz();
          }, 600);
        } else {
          seWrong();
          b.classList.add("wrong");
          setTimeout(() => b.classList.remove("wrong"), 450);
        }
      };
      opts.appendChild(b);
    });
    document.getElementById("qz-play").onclick = () => speak(target.en, { who: "mum", rate: 0.85 });
    speak(target.en, { who: "mum", rate: 0.85 });
  }

  drawCard();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---------- 4. フレーズ ---------- */
function renderPhrases(body, d) {
  let i = 0;
  function draw() {
    const p = d.phrases[i];
    const sayText = p.en.replace(/〜/g, "something").replace(/ \/ /g, ". ");
    body.innerHTML = `
      <h2 class="section-title">💬 フレーズ</h2>
      <p class="section-sub">そのまま つかえる いいかた ${i + 1} / ${d.phrases.length}</p>
      <div class="card">
        <div class="phrase-en">${p.en}</div>
        <div class="phrase-ja">${p.ja}</div>
        <div class="phrase-note">💡 ${p.note}</div>
        <div class="phrase-example">🗣 ${p.example}</div>
      </div>
      <div class="listen-controls">
        <button class="sub-btn" id="ph-play">🔊 きく</button>
        <button class="sub-btn" id="ph-ex">🔊 れいぶんを きく</button>
      </div>
      <div style="margin-top:20px;">
        <button class="big-btn green" id="ph-said">まねして いえた！</button>
      </div>`;
    const exText = p.example.replace(/（.*?）/g, "");
    document.getElementById("ph-play").onclick = () => speak(sayText, { who: "mum", rate: 0.85 });
    document.getElementById("ph-ex").onclick = () => speak(exText, { who: "mum", rate: 0.85 });
    document.getElementById("ph-said").onclick = () => {
      i++;
      if (i >= d.phrases.length) sectionClear(false);
      else draw();
    };
    speak(sayText, { who: "mum", rate: 0.85 });
  }
  draw();
}

/* ---------- 5. フォニックス（おまけ） ---------- */
function renderPhonics(body, d) {
  const p = d.phonics;
  body.innerHTML = `
    <h2 class="section-title">🔡 おまけ：フォニックス</h2>
    <p class="section-sub">やると ボーナスエサが もらえるよ（スキップも できる）</p>
    <div class="card" style="text-align:center;">
      <div class="phonics-sound">${p.sound}</div>
      <p style="color:var(--muted); font-size:14.5px;">${p.ja}</p>
      <p style="margin-top:10px; font-size:15px;">きょうの おはなしに でてきた「<b>${p.example}</b>」の なかに あるよ</p>
      <div class="phonics-words" id="pn-words"></div>
      <p style="color:var(--muted); font-size:13px; margin-top:12px;">ことばを タップして おとを きいて、まねして よんでみよう</p>
    </div>
    <div style="display:flex; gap:12px; margin-top:20px;">
      <button class="sub-btn" id="pn-skip" style="flex:1; padding:14px;">スキップ</button>
      <button class="big-btn green" id="pn-done" style="flex:2;">よめた！</button>
    </div>`;
  const wrap = document.getElementById("pn-words");
  [p.example, ...p.words].forEach(w => {
    const b = document.createElement("button");
    b.className = "phonics-word";
    b.textContent = w;
    b.onclick = () => speak(w, { who: "mum", rate: 0.8 });
    wrap.appendChild(b);
  });
  document.getElementById("pn-skip").onclick = () => sectionSkip();
  document.getElementById("pn-done").onclick = () => sectionClear(true);
  speak(p.example, { who: "mum", rate: 0.8 });
}

/* ================= おとチェック ================= */
document.getElementById("btn-soundtest").onclick = () => {
  speak("Hello! Nice to meet you!", { who: "mum" });
  document.getElementById("btn-heard").classList.add("show");
};
document.getElementById("btn-heard").onclick = () => {
  state.soundChecked = true;
  saveState();
  if (!state.eggId) { show("screen-eggpick"); renderEggPick(); }
  else { show("screen-home"); renderHome(); }
};

/* ================= 起動 ================= */
(function init() {
  if (!state.soundChecked) {
    show("screen-soundcheck");
  } else if (!state.eggId) {
    show("screen-eggpick");
    renderEggPick();
  } else {
    show("screen-home");
    renderHome();
  }
})();
</script>
